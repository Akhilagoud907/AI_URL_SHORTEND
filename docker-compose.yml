version: "3.9"

services:

  postgres:

    image: postgres:16

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: url_shortener

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  backend:

    build: ./backend

    ports:

      - "5000:5000"

    depends_on:

      - postgres

    env_file:

      - ./backend/.env

    volumes:

      - ./backend:/app

      - /app/node_modules

  frontend:

    build: ./frontend

    ports:

      - "5173:5173"

    depends_on:

      - backend

    volumes:

      - ./frontend:/app

      - /app/node_modules

volumes:

  postgres_data: